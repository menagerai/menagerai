# LOCAL ONLY. Publishes the internal Traefik on a host port so you can browse the
# demo at http://localhost. On Coolify this is not used — the platform routes the
# demo domain to the traefik service directly. Build contexts are root-relative, so
# run from the repo root with the project directory pinned there and pass both files:
#
#   DEMO_SECRET=$(openssl rand -hex 24) docker compose --project-directory . \
#     -f demo/docker-compose.yml -f demo/docker-compose.override.yml up --build
#   → http://localhost   (pick a persona)
services:
  traefik:
    ports:
      - "${DEMO_HTTP_PORT:-80}:80"
