# Self-contained Menagerai demo: portal + three mock apps, wired through the REAL
# ForwardAuth gateway — using the host platform's OWN Traefik (Coolify's), not a
# nested proxy. Routing and the gateway middleware are declared as Traefik labels,
# so Coolify's Traefik serves everything under one domain:
#
#   demo.<your-domain>/            → portal (login, admin, launcher)
#   demo.<your-domain>/apps/<key>  → the mock app, behind the menagerai-auth gateway
#
# On Coolify (one Docker-Compose resource): keep Base Directory "/" (repo root) and
# Compose file "demo/docker-compose.yml", then:
#   1. Set the portal service's domain (FQDN) to https://demo.<your-domain> — this
#      is what issues the TLS cert and routes "/" to the portal.
#   2. Turn ON "Connect To Predefined Network" for the resource, so Coolify's
#      Traefik can read the app labels below and reach the portal for ForwardAuth.
#   3. Set DEMO_SECRET (>=16 chars). The apps and portal are otherwise internal —
#      do NOT give pulse/wiki/desk their own domains; they are reached only through
#      the /apps/<key> routers + the gateway.
#
# Locally, run FROM THE REPO ROOT with the project directory pinned there (contexts
# are root-relative) and add the override (a throwaway Traefik + the portal router):
#   DEMO_SECRET=$(openssl rand -hex 24) docker compose --project-directory . \
#     -f demo/docker-compose.yml -f demo/docker-compose.override.yml up --build
#   → http://localhost
#
# The database is in-container and resets DEMO_LIMIT_MINS after the first sign-in.

services:
  portal:
    # Build contexts are repo-root-relative: Coolify runs compose with the project
    # directory set to the repo root, so paths resolve from there (NOT from demo/).
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEMO_MODE: "true"
      DEMO_SECRET: "${DEMO_SECRET:?set DEMO_SECRET (>=16 chars)}"
      DEMO_LIMIT_MINS: "${DEMO_LIMIT_MINS:-10}"
      PORTAL_BASE_URL: "${PORTAL_BASE_URL:-http://localhost}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      GATEWAY_PUBLIC: "false"
      SQLITE_PATH: "/tmp/menagerai-demo.db"
    # 3000 = public app (routed at "/" by the platform via the portal's FQDN);
    # 3001 = internal verify, reached only by the ForwardAuth middleware below.
    labels:
      - traefik.enable=true
      - traefik.http.services.portal.loadbalancer.server.port=3000
      # The gateway middleware every app router attaches. Traefik calls the portal's
      # internal verify port and copies the four X-Menagerai-* headers onto the
      # request it forwards to the app. Service-name address works because all
      # services share the network (Coolify: "Connect To Predefined Network").
      - traefik.http.middlewares.menagerai-auth.forwardauth.address=http://portal:3001/gateway/verify
      - traefik.http.middlewares.menagerai-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.menagerai-auth.forwardauth.authResponseHeaders=X-Menagerai-User-Email,X-Menagerai-User-ID,X-Menagerai-Roles,X-Menagerai-Proxy-Secret

  pulse:
    build: { context: ./demo/apps, dockerfile: Dockerfile, args: { APP: pulse } }
    restart: unless-stopped
    environment:
      DEMO_SECRET: "${DEMO_SECRET:?}"
      APP_BASE_PATH: /apps/pulse
      PORTAL_URL: "${PORTAL_BASE_URL:-http://localhost}"
    labels:
      - traefik.enable=true
      # No stripprefix: the app tolerates the full path, and the gateway needs the
      # /apps/<key> prefix intact to identify the app. Priority beats the portal's
      # "/" router. menagerai-auth runs first (it is the only middleware).
      - "traefik.http.routers.pulse.rule=PathPrefix(`/apps/pulse`)"
      - traefik.http.routers.pulse.priority=100
      - traefik.http.routers.pulse.middlewares=menagerai-auth
      - traefik.http.services.pulse.loadbalancer.server.port=3000

  wiki:
    build: { context: ./demo/apps, dockerfile: Dockerfile, args: { APP: wiki } }
    restart: unless-stopped
    environment:
      DEMO_SECRET: "${DEMO_SECRET:?}"
      APP_BASE_PATH: /apps/wiki
      PORTAL_URL: "${PORTAL_BASE_URL:-http://localhost}"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wiki.rule=PathPrefix(`/apps/wiki`)"
      - traefik.http.routers.wiki.priority=100
      - traefik.http.routers.wiki.middlewares=menagerai-auth
      - traefik.http.services.wiki.loadbalancer.server.port=3000

  desk:
    build: { context: ./demo/apps, dockerfile: Dockerfile, args: { APP: desk } }
    restart: unless-stopped
    environment:
      DEMO_SECRET: "${DEMO_SECRET:?}"
      APP_BASE_PATH: /apps/desk
      PORTAL_URL: "${PORTAL_BASE_URL:-http://localhost}"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.desk.rule=PathPrefix(`/apps/desk`)"
      - traefik.http.routers.desk.priority=100
      - traefik.http.routers.desk.middlewares=menagerai-auth
      - traefik.http.services.desk.loadbalancer.server.port=3000
