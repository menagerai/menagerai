# Self-contained Menagerai demo: an internal Traefik + the portal + three mock apps,
# wired through the REAL ForwardAuth gateway. Deterministic and platform-agnostic —
# the internal Traefik owns all /apps/<key> routing from a baked-in static config
# (demo/traefik/dynamic.yml), so there is NO stripprefix, NO Docker-label discovery,
# and NO platform-generated routers to fight. The gateway always sees the full
# /apps/<key> path.
#
#   demo.<your-domain>/            → portal (login, admin, launcher)
#   demo.<your-domain>/apps/<key>  → the mock app, behind the menagerai-auth gateway
#
# On Coolify (one Docker-Compose resource): keep Base Directory "/" (repo root) and
# Compose file "demo/docker-compose.yml", then:
#   1. Give the `traefik` service — and ONLY that service — the domain
#      https://demo.<your-domain> (target port 80). Coolify auto-generates the
#      http/https routers, TLS (letsencrypt), gzip and http→https redirect for it,
#      then forwards the full request to this internal Traefik, which routes onward.
#      Leave portal/pulse/wiki/desk with NO domain.
#   2. Set DEMO_SECRET (>=16 chars) and PORTAL_BASE_URL=https://demo.<your-domain>,
#      COOKIE_SECURE=true.
#
# Locally, run FROM THE REPO ROOT (contexts are root-relative) and add the override,
# which publishes the internal Traefik on your host:
#   DEMO_SECRET=$(openssl rand -hex 24) docker compose --project-directory . \
#     -f demo/docker-compose.yml -f demo/docker-compose.override.yml up --build
#   → http://localhost
#
# The database is in-container and resets DEMO_LIMIT_MINS after the first sign-in.

services:
  traefik:
    # Routing config is baked into the image (see demo/traefik/Dockerfile), so there
    # is nothing to bind-mount. No host port here — Coolify routes the demo domain to
    # this service's :80; the local override publishes it for `docker compose up`.
    build:
      context: ./demo/traefik
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --entryPoints.web.address=:80
    depends_on:
      - portal

  portal:
    # Build contexts are repo-root-relative: Coolify runs compose with the project
    # directory set to the repo root, so paths resolve from there (NOT from demo/).
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEMO_MODE: "true"
      DEMO_SECRET: "${DEMO_SECRET:?set DEMO_SECRET (>=16 chars)}"
      DEMO_LIMIT_MINS: "${DEMO_LIMIT_MINS:-10}"
      PORTAL_BASE_URL: "${PORTAL_BASE_URL:-http://localhost}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      GATEWAY_PUBLIC: "false"
      SQLITE_PATH: "/tmp/menagerai-demo.db"

  pulse:
    build: { context: ./demo/apps, dockerfile: Dockerfile, args: { APP: pulse } }
    restart: unless-stopped
    environment:
      DEMO_SECRET: "${DEMO_SECRET:?}"
      APP_BASE_PATH: /apps/pulse
      PORTAL_URL: "${PORTAL_BASE_URL:-http://localhost}"

  wiki:
    build: { context: ./demo/apps, dockerfile: Dockerfile, args: { APP: wiki } }
    restart: unless-stopped
    environment:
      DEMO_SECRET: "${DEMO_SECRET:?}"
      APP_BASE_PATH: /apps/wiki
      PORTAL_URL: "${PORTAL_BASE_URL:-http://localhost}"

  desk:
    build: { context: ./demo/apps, dockerfile: Dockerfile, args: { APP: desk } }
    restart: unless-stopped
    environment:
      DEMO_SECRET: "${DEMO_SECRET:?}"
      APP_BASE_PATH: /apps/desk
      PORTAL_URL: "${PORTAL_BASE_URL:-http://localhost}"
